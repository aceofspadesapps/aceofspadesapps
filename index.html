<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace of Spades Apps - Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Global Typography Overrides */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #050505;
            color: #ffffff;
            margin: 0;
            opacity: 0;
            animation: pageFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h1, h2, h3, h4 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .tech-mono {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Smooth Page Load Animation */
        @keyframes pageFadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Feature Matrix Layout */
        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .matrix-column {
            background: #0c0c0c;
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 30px;
        }

        .matrix-title {
            color: var(--gold, #d4af37);
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(212,175,55,0.15);
            padding-bottom: 10px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .matrix-feature { margin-bottom: 20px; }
        .matrix-feature:last-child { margin-bottom: 0; }
        .matrix-feature h4 { color: #ffffff; font-size: 0.95rem; margin: 0 0 5px 0; font-weight: 600; }
        .matrix-feature p { color: var(--text-muted, #888); font-size: 0.85rem; line-height: 1.5; margin: 0; }

        /* Custom Section Divider */
        .app-divider {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, rgba(0,0,0,0), rgba(212,175,55,0.2) 50%, rgba(0,0,0,0));
            margin: 80px auto;
            max-width: 900px;
        }

        /* Pulsing Live Dot Animation */
        .pulse-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            background-color: #2ecc71;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
