<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace of Spades Apps - Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Global Typography Overrides */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #050505;
            color: #ffffff;
            margin: 0;
            opacity: 0;
            animation: pageFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h1, h2, h3, h4 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .tech-mono {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Smooth Page Load Animation */
        @keyframes pageFadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Custom styling for the clean horizontal image slider */
        .preview-slider-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 5px;
            width: 100%;
            scroll-snap-type: x mandatory;
            scrollbar-width: thin;
            scrollbar-color: rgba(212,175,55,0.3) rgba(0,0,0,0.2);
        }
        
        .preview-slider-container::-webkit-scrollbar {
            height: 6px;
        }
        .preview-slider-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        .preview-slider-container::-webkit-scrollbar-thumb {
            background-color: rgba(212,175,55,0.4);
            border-radius: 10px;
        }

        .slider-item {
            flex: 0 0 auto;
            scroll-snap-align: start;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            background: #080808;
            display: flex;
            align-items: center;
        }

        .item-wide { width: 320px; height: auto; }
        .item-tall { width: 170px; height: auto; }
        .slider-item img { width: 100%; height: auto; display: block; }

        /* Feature Matrix Layout */
        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .matrix-column {
            background: #0c0c0c;
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 30px;
        }

        .matrix-title {
            color: var(--gold, #d4af37);
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(212,175,55,0.15);
            padding-bottom: 10px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .matrix-feature { margin-bottom: 20px; }
        .matrix-feature:last-child { margin-bottom: 0; }
        .matrix-feature h4 { color: #ffffff; font-size: 0.95rem; margin: 0 0 5px 0; font-weight: 600; }
        .matrix-feature p { color: var(--text-muted, #888); font-size: 0.85rem; line-height: 1.5; margin: 0; }

        /* Custom Section Divider */
        .app-divider {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, rgba(0,0,0,0), rgba(212,175,55,0.2) 50%, rgba(0,0,0,0));
            margin: 80px auto;
            max-width: 900px;
        }

        /* Pulsing Live Dot Animation */
        .pulse-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            background-color: #2ecc71;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
            box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7);
            animation: pulse 1.6s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(46, 204, 113, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        /* Changelog Timeline Styling */
        .changelog-section {
            max-width: 800px;
            margin: 80px auto 20px auto;
            padding: 0 20px;
        }
        .changelog-container {
            border-left: 2px solid rgba(212,175,55,0.15);
            padding-left: 25px;
            margin-top: 30px;
        }
        .changelog-item {
            position: relative;
            margin-bottom: 30px;
        }
        .changelog-item::before {
            content: '';
            position: absolute;
            left: -31px;
            top: 5px;
            width: 10px;
            height: 10px;
            background: #050505;
            border: 2px solid var(--gold, #d4af37);
            border-radius: 50%;
        }
        .changelog-version {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            color: var(--gold, #d4af37);
            font-size: 0.9rem;
        }
        .changelog-date {
            font-size: 0.75rem;
            color: #666;
            margin-left: 10px;
        }
        .changelog-text {
            color: #aaa;
            font-size: 0.85rem;
            margin: 5px 0 0 0;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Logo" class="logo-img">
            <span class="brand-name">Ace of Spades Apps</span>
        </div>
        <nav>
            <a href="index.html" class="active">Showcase</a>
